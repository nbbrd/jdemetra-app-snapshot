version: 2
updates:
  - package-ecosystem: maven
    target-branch: "main"
    directory: "/"
    schedule:
      interval: daily
      time: "04:00"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "org.jreleaser:jdks-maven-plugin"
        versions: ["1.24.0"]
  - package-ecosystem: "github-actions"
    target-branch: "main"
    directory: "/"
    schedule:
      interval: "daily"
